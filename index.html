   function buscarIgreja() {
    const termoBusca = document.getElementById("inputBusca").value.toLowerCase().trim();
    
    let encontrados = [];

    marcadores.forEach(item => {
        const nomeIgreja = (item.igreja.nome || "").toLowerCase();
        const enderecoIgreja = (item.igreja.morada || "").toLowerCase();

        if (nomeIgreja.includes(termoBusca) || enderecoIgreja.includes(termoBusca)) {
            if (!map.hasLayer(item.marker)) {
                item.marker.addTo(map);
            }
            encontrados.push(item);
        } else {
            if (map.hasLayer(item.marker)) {
                map.removeLayer(item.marker);
            }
        }
    });

    // Se encontrar só 1 igreja
    if (encontrados.length === 1) {
        const alvo = encontrados[0];
        const latLng = [alvo.igreja.lat, alvo.igreja.lng];

        if (window.innerWidth < 768) {
            map.setView(latLng, 15);
            map.panBy([0, -100]);
        } else {
            map.setView(latLng, 15);
        }

        alvo.marker.openPopup();
        document.getElementById("inputBusca").blur();
    }
} // ← FECHAMENTO CORRETO DA FUNÇÃO


function irParaMinhaLocalizacao() {

    if (!navigator.geolocation) {
        alert("Geolocalização não suportada");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function(pos) {

            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            minhaLocalizacao = { lat, lng };

            setTimeout(() => {
                map.invalidateSize();

                map.flyTo([lat, lng], 16, {
                    animate: true,
                    duration: 1.5
                });

            }, 200);

            if (marcadorUsuario) {
                map.removeLayer(marcadorUsuario);
            }

            marcadorUsuario = L.marker([lat, lng], { icon: iconeYellow })
                .addTo(map)
                .bindPopup("📍 Você está aqui")
                .openPopup();

        },
        function(error) {
            console.log(error);
            alert("Erro ao obter localização. Ative o GPS.");
        },
        {
            enableHighAccuracy: false,
            timeout: 5000
        }
    );


    // LÓGICA DE ATUALIZAÇÃO DO PAINEL E POPUP:
    // Se a busca retornar exatamente 1 igreja, focamos nela e abrimos as informações
    if (encontrados.length === 1) {
        const alvo = encontrados[0];
        const latLng = [alvo.igreja.lat, alvo.igreja.lng];
        
        // No mobile, centralizamos um pouco acima para o teclado não cobrir
        if (window.innerWidth < 768) {
            map.setView(latLng, 15);
            // Faz o mapa "subir" um pouco (0.005 graus) para compensar o teclado
            map.panBy([0, -100]); 
        } else {
            map.setView(latLng, 15);
        }
        
        alvo.marker.openPopup(); 
        
        

        // Fecha o teclado automaticamente após encontrar (opcional)
        document.getElementById("inputBusca").blur();
    }
    
    }

let minhaLocalizacao = null;
let marcadorUsuario;
let marcadores = [];

// Distância (Haversine)
function distancia(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI/180;
    const dLon = (lon2 - lon1) * Math.PI/180;

    const a = Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)**2;

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// Popup com rota
function criarPopup(igreja) {
    let link;

    if (minhaLocalizacao) {
        link = `https://www.google.com/maps/dir/?api=1&origin=${minhaLocalizacao.lat},${minhaLocalizacao.lng}&destination=${igreja.lat},${igreja.lng}`;
    } else {
        link = `https://www.google.com/maps/dir/?api=1&destination=${igreja.lat},${igreja.lng}`;
    }

    return `
        <div style="font-size:13px; line-height:1.4;">
            <b style="font-size:14px;">⛪ ${igreja.nome}</b><br>

            <span style="color:#666; font-size:11px;">
                ${igreja.morada}
            </span>

            <div style="margin-top:8px; padding:6px; background:#f5f5f5; border-radius:6px;">
                <b>📅 Horários:</b>
                ${igreja.culto}
            </div>

            <a href="${link}" target="_blank" class="btn-rota">
                🚗 Ir pelo Google Maps
            </a>
        </div>
    `;
}


// Adicionar igrejas
function adicionarIgrejas() {

    igrejas.forEach(igreja => {

        const marker = L.marker([igreja.lat, igreja.lng], { icon: iconeAzul })
            .addTo(map)
            .bindPopup(criarPopup(igreja));

        marker.on("click", () => {
            atualizarPainel(igreja);
        });

        marcadores.push({ marker, igreja });
    });
}
map.on("popupclose", () => {
    
    // limpa campo de busca
    document.getElementById("inputBusca").value = "";

    // mostra todos os marcadores novamente
    marcadores.forEach(item => {
        item.marker.addTo(map);
    });

});
// Igreja mais próxima
function igrejaMaisProxima() {

    if (!minhaLocalizacao) return;

    let menor = Infinity;
    let maisProxima = null;

    marcadores.forEach(item => {

        const d = distancia(
            minhaLocalizacao.lat,
            minhaLocalizacao.lng,
            item.igreja.lat,
            item.igreja.lng
        );

        if (d < menor) {
            menor = d;
            maisProxima = item;
        }

        // volta ícone normal
        item.marker.setIcon(iconeAzul);
    });

    if (maisProxima) {
        maisProxima.marker.setIcon(iconeGrande);
        maisProxima.marker.openPopup();
        atualizarPainel(maisProxima.igreja);
        map.setView(maisProxima.marker.getLatLng(), 15);
    }
}

// Atualiza popups
function atualizarPopups() {
    marcadores.forEach(item => {
        item.marker.setPopupContent(criarPopup(item.igreja));
    });
}

// Geolocalização automática (mantida)
function pegarLocalizacao() {

    if (!navigator.geolocation) return;

    navigator.geolocation.getCurrentPosition(pos => {

        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        minhaLocalizacao = { lat, lng };

        if (marcadorUsuario) {
            map.removeLayer(marcadorUsuario);
        }

        marcadorUsuario = L.marker([lat, lng], { icon: iconeYellow })
            .addTo(map)
            .bindPopup("📍 Você está aqui")
            .openPopup();

        map.setView([lat, lng], 14);

        atualizarPopups();

    });
}

// Inicialização
adicionarIgrejas();
pegarLocalizacao();
